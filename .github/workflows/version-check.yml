# Lockstep version policy. Every crate in the workspace inherits its
# version from `[workspace.package]` in the root Cargo.toml. wasm-sim
# and dash live outside that workspace for unrelated reasons (wasm-sim
# has its own release profile; dash is not a Rust crate) but their
# version strings are kept in sync manually.
#
# Rule: if anything under the watched source globs changes, all three
# version sources (workspace, wasm-sim, dash) must be equal AND the
# workspace version must have been bumped from the base branch's value.

name: version-check

on:
  pull_request:
    branches: [main]

jobs:
  versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: lockstep-or-fail
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-only "$base" HEAD)

          # Did any tracked source change in this PR? Generated wasm-sim/pkg
          # is regenerated on every wasm-pack build so it's not a useful
          # trigger; key on the actual source dirs.
          if ! echo "$changed" | grep -qE '^(crates/[^/]+/(src|tests|build\.rs)|dash/wasm-sim/src|dash/src)/'; then
              echo "no source changes; skipping version check"
              exit 0
          fi

          read_workspace() { awk -F\" '/^\[workspace\.package\]/{f=1} f && /^version =/{print $2; exit}' Cargo.toml; }
          read_wasm()      { awk -F\" '/^version =/{print $2; exit}' dash/wasm-sim/Cargo.toml; }
          read_dash()      { jq -r '.version' dash/package.json; }

          ws=$(read_workspace)
          wasm=$(read_wasm)
          dash=$(read_dash)

          if [ "$ws" != "$wasm" ] || [ "$ws" != "$dash" ]; then
              echo "::error::version drift — Cargo.toml [workspace.package]=$ws  wasm-sim=$wasm  dash/package.json=$dash"
              exit 1
          fi

          prev=$(git show "$base:Cargo.toml" | awk -F\" '/^\[workspace\.package\]/{f=1} f && /^version =/{print $2; exit}')
          if [ "$ws" = "$prev" ]; then
              echo "::error::source changed but workspace version $ws was not bumped from base ($prev)"
              echo "::error::bump [workspace.package].version in Cargo.toml, plus dash/wasm-sim/Cargo.toml and dash/package.json to match"
              exit 1
          fi

          echo "OK: workspace=$ws (was $prev), wasm-sim=$wasm, dash=$dash"
