# Disable IPv6 in the kernel. The Pi's home WiFi typically hands out
# a SLAAC global v6 address but the upstream router doesn't actually
# forward v6, and tailscaled (and other clients) prefer AAAA records
# from DNS — they then dial v6, get ENETUNREACH instantly, and
# never fall through to v4 within their request deadline.
#
# Disabling at the kernel level is the nuclear option that just
# makes AF_INET6 sockets fail at construction, so libraries fall
# back to v4 cleanly.
#
# Installed at /etc/sysctl.d/99-led-disable-ipv6.conf during
# flash-sd; takes effect on first boot via systemd-sysctl.

net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1
