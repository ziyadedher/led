[Journal]
# Force persistent storage and sync every second so we capture logs
# even when the Pi is power-cycled without a clean shutdown (which
# is most of our debug loop). Default `SyncIntervalSec=5min` means
# a quick yank after boot loses everything.
Storage=persistent
SyncIntervalSec=1s
ForwardToConsole=yes
TTYPath=/dev/tty1
