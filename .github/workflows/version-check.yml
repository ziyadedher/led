# Fail the PR if source for a package changed without a version bump.
# Convention here is to bump the affected packages on every functional
# change so `panels.driver_version` (in the dash) and the dash's own
# version reflect what's actually shipping. Catching it pre-merge
# beats finding out later that two binaries with the same version
# behave differently.
#
# Edit `packages` below to add/remove tracked packages. Each entry is
# `<sources glob>:<manifest path>:<grep pattern>` — sources is what
# triggers the check, manifest is the file whose version line must
# change, pattern is the line shape to match.

name: version-check

on:
  pull_request:
    branches: [main]

jobs:
  versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: bump-or-fail
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          changed=$(git diff --name-only "$base" HEAD)
          fail=0
          check() {
              local label="$1" sources="$2" manifest="$3" pattern="$4"
              if echo "$changed" | grep -qE "$sources"; then
                  if ! echo "$changed" | grep -qx "$manifest"; then
                      echo "::error file=$manifest::source under '$label' changed but $manifest version was not bumped"
                      fail=1
                      return
                  fi
                  if ! git diff "$base" HEAD -- "$manifest" | grep -qE "^[+-]$pattern"; then
                      echo "::error file=$manifest::$manifest changed but the version line ($pattern) didn't"
                      fail=1
                  fi
              fi
          }
          check display-core 'crates/display-core/(src|tests)/'  crates/display-core/Cargo.toml '\s*version = '
          check led-driver   'crates/driver/(src|build\.rs)'      crates/driver/Cargo.toml       '\s*version = '
          check wifi-setup   'crates/wifi-setup/src/'             crates/wifi-setup/Cargo.toml   '\s*version = '
          check wasm-sim     'dash/wasm-sim/src/'                 dash/wasm-sim/Cargo.toml       '\s*version = '
          check dash         'dash/src/'                          dash/package.json              '\s*"version":'
          exit $fail
