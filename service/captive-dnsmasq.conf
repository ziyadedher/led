# NetworkManager dnsmasq drop-in for shared-mode (AP) connections.
# Installed at /etc/NetworkManager/dnsmasq-shared.d/captive-portal.conf
# during flash-sd; loaded automatically when NM brings up the
# led-setup-* AP.
#
# Hijacks every DNS query to resolve to the gateway (10.42.0.1) so
# the captive-portal probes that iOS / Android / macOS / Windows fire
# at well-known hostnames (captive.apple.com, connectivitycheck.gstatic.com,
# msftconnecttest.com, etc.) all hit our HTTP server. The wifi-setup
# binary's catch-all fallback then 302→/ on any path, which the OS
# treats as "captive portal detected" and pops the page automatically.
#
# Format: dnsmasq's `address=/<domain>/<ip>` syntax. Using `#` as the
# domain matches everything.

address=/#/10.42.0.1
